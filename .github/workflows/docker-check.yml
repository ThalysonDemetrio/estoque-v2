name: Estoque V2 - CI / Docker Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Validar docker-compose.yml (Local)
        run: docker compose config --quiet

      # docker-compose.vps.yml referencia deploy/.env.vps (não versionado).
      # Na CI copiamos apenas o modelo — sem segredos reais no repositório.
      - name: Preparar artefatos para Compose VPS (CI)
        run: |
          mkdir -p backups deploy
          cp deploy/.env.vps.example deploy/.env.vps

      - name: Validar docker-compose.vps.yml (Produção)
        run: docker compose -f docker-compose.vps.yml config --quiet

      - name: Testar build das imagens (VPS)
        run: docker compose -f docker-compose.vps.yml build --no-cache --progress=plain --quiet

      - name: Teste de inicialização (dry-run)
        run: docker compose -f docker-compose.vps.yml up --no-start 