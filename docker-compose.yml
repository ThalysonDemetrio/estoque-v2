services:
  postgres:
    image: postgres:16
    container_name: estoque-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-estoque}
    ports:
      - "5432:5432"
    volumes:
      - estoque_pg_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-estoque}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  estoque_pg_data:
