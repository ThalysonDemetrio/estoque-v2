# ============================================
# SEPARAÇÃO TOTAL: Frontend e Backend independentes
# ============================================
# O frontend é servido pelo seu próprio container nginx (frontend:80).
# O backend é acessado através do proxy /api/ abaixo.

server_tokens off;

upstream backend {
    server backend:3000;
    keepalive 16;
}

# Rate limit — zona compartilhada de 10 MB (~160 000 IPs)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # ── Segurança ─────────────────────────────────────────────────────────────
    add_header X-Frame-Options              "SAMEORIGIN"                                always;
    add_header X-Content-Type-Options       "nosniff"                                   always;
    add_header X-XSS-Protection             "1; mode=block"                             always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"           always;
    add_header Permissions-Policy           "camera=(self), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains"        always;

    # ── Compressão ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types
        text/plain text/css text/xml text/javascript application/json
        application/javascript application/x-javascript application/xml+rss
        image/svg+xml;

    # ── API (proxy para backend) ──────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout 60s;
        proxy_pass http://backend;
    }

    # ── Frontend — proxy para container frontend ──────────────────────────────
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://frontend:3000;
    }
}
