name: Estoque V2 - CI / Docker Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Validar docker-compose.yml (Local)
        run: docker compose config --quiet

      - name: Validar docker-compose.vps.yml (Produção)
        run: docker compose -f docker-compose.vps.yml config --quiet

      - name: Criar diretórios necessários
        run: mkdir -p backups deploy

      - name: Testar build das imagens (VPS)
        run: docker compose -f docker-compose.vps.yml build --no-cache --progress=plain --quiet

      - name: Teste de inicialização (dry-run)
        run: docker compose -f docker-compose.vps.yml up --no-start --quiet